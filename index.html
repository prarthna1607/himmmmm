<!DOCTYPE html>
<html>
<head>

<title>For My Love ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family: 'Arial';
height:100vh;
overflow:hidden;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.container{
z-index:2;
}

h1{
font-size:60px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 25px pink;}
}

p{
font-size:22px;
max-width:600px;
margin:auto;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ffe5ec;
}

#hiddenMessage{
display:none;
font-size:26px;
margin-top:25px;
}

.heart{
position:absolute;
color:red;
animation: fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>

</head>

<body>

<div class="container">

<h1>I Miss You Harshh❤️</h1>

<p id="typing"></p>

<button onclick="showLove()">Click if you love me 😌</button>

<div id="hiddenMessage">
I miss you more than words can explain ❤️  
You mean more to me than you think.  
And yes… I love you more than you imagine.
</div>

</div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>

const text="Even when you're not here, you're always on my mind. I just wanted to remind you how special you are to me.";
let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

typeWriter();

function showLove(){
document.getElementById("hiddenMessage").style.display="block";
createHearts();
}

function createHearts(){

for(let i=0;i<30;i++){

let heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";
heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

}

setInterval(createHearts,800);

</script>

</body>
</html>
